<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>URE SJR Preto • Escolas x CIE</title>

<link rel="stylesheet" href="styles.css"/>

</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="loginContainer">
  <form id="loginForm" class="card loginCard">
    <h2>Acesso Restrito</h2>
    <input id="loginEmail" type="email" placeholder="Email" required>
    <input id="loginPassword" type="password" placeholder="Senha" required>
    <button class="btn primary">Entrar</button>
    <div id="loginError" class="msg err"></div>
  </form>
</div>

<!-- APP -->
<div id="appScreen" style="display:none;">

<header class="topbar">

<div class="wrap headerFlex">

<h1 class="logoTitle">
<img src="masct_ure.png" class="logoMascot">
<span>CONSULTE AQUI O CIE OU O NOME DAS ESCOLAS</span>
</h1>

<div class="headerBtns">
<button id="toggleDark" class="btn">🌙</button>
<button id="logoutBtn" class="btn">Sair</button>
</div>

</div>

</header>

<!-- MENU PRINCIPAL -->

<div class="wrap mainTabs">

<button class="mainTab active" data-page="sistema">Sistema</button>
<button class="mainTab" data-page="historico">Histórico de Atendimento</button>

</div>

<!-- PÁGINA SISTEMA -->

<div id="page-sistema">

<main class="wrap grid">

<section class="card">

<h2>Cadastrar / Atualizar</h2>

<form id="schoolForm" class="form">

<div class="row">

<label>
CIE (somente números)
<input id="cie" inputmode="numeric" placeholder="Ex: 123456" required>
</label>

<label>
Nome da escola
<input id="nome" placeholder="Ex: EE Prof. João da Silva" required>
</label>

</div>

<div class="row">

<label>
URE
<input id="ure" value="São José do Rio Preto">
</label>

<label>
Município
<input id="municipio" placeholder="Ex: São José do Rio Preto">
</label>

</div>

<div class="actions">
<button type="submit" class="btn primary">Salvar</button>
<button type="button" id="btnClear" class="btn">Limpar</button>
</div>

<div id="formMsg" class="msg"></div>

</form>

</section>

<section class="card">

<h2>Busca</h2>

<div class="tabs">
<button class="tab active" data-tab="cie">Buscar por CIE</button>
<button class="tab" data-tab="nome">Buscar por Nome</button>
</div>

<div id="tab-cie" class="tabpanel active">

<label>
Digite o CIE
<input id="searchCie" inputmode="numeric">
</label>

<button id="btnSearchCie" class="btn primary">Buscar</button>

</div>

<div id="tab-nome" class="tabpanel">

<label>
Digite parte do nome ou município
<input id="searchNome">
</label>

<button id="btnSearchNome" class="btn primary">Buscar</button>

</div>

<div id="result" class="result"></div>

</section>

<section class="card full">

<div class="listHeader">

<h2>Lista</h2>
<p id="schoolCount"></p>

<button id="btnReload" class="btn">Recarregar</button>

</div>

<div class="tableWrap">

<table>

<thead>
<tr>
<th>Escola</th>
<th>CIE</th>
<th>Município</th>
<th>URE</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</section>

<section class="card full">

<h2>Importar em massa</h2>

<p class="hint">
NOME DA ESCOLA ; CIE ; MUNICÍPIO
</p>

<textarea id="bulk" rows="6"></textarea>

<div class="actions">
<button id="btnBulk" class="btn primary">Importar</button>
<div id="bulkMsg" class="msg"></div>
</div>

</section>

</main>

</div>

<!-- PÁGINA HISTÓRICO -->

<div id="page-historico" style="display:none">

<div class="wrap">

<h2>Histórico de Atendimento</h2>

<div id="cardsHistorico" class="cardsGrid"></div>

</div>

</div>

<!-- MODAL HISTÓRICO -->

<div id="modalHistorico" class="modal">

<div class="modalContent">

<h3 id="modalSchool"></h3>

<div id="historicoLista"></div>

<textarea id="historicoTexto" placeholder="Descreva o atendimento realizado"></textarea>

<button type="button" id="btnSalvarHistorico" class="btn primary">Salvar anotação</button>

<button id="btnFecharModal" class="btn">Fechar</button>

</div>

</div>

<script type="module" src="app.js"></script>

</div>

</body>
</html>
